name: "GEML check"
description: "Fail the build when a GEML document has an error — a dangling [[#id]], a broken cross-reference, a duplicate id, or any parse error."
author: "GEML"
branding:
  icon: "check-circle"
  color: "purple"

inputs:
  files:
    description: >-
      Space-separated globs of .geml files to check. Default: every .geml file
      tracked in the repository.
    required: false
    default: ""
  version:
    description: "Version of the @geml/geml npm package to run (e.g. 1.0.0, latest)."
    required: false
    default: "latest"
  root:
    description: >-
      Optional directory to widen cross-document reference checking to
      (forwarded as `geml check --root`). Set to "." to allow repo-relative
      references between sibling directories; escapes past this root are still
      refused. Default: unset — each file's references resolve only within its
      own directory subtree. Requires a @geml/geml version that supports
      `--root` (> 1.2.2).
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - shell: bash
      # Pass inputs through the environment rather than interpolating them into
      # the script body. As a PUBLISHED composite action, a consumer may pipe
      # PR-derived data (title/branch/body/filenames) into these inputs; with
      # `${{ }}` interpolation that would be shell-injectable. Env vars are data,
      # so command/arithmetic/brace substitution is never performed on them.
      env:
        VERSION: ${{ inputs.version }}
        FILES: ${{ inputs.files }}
        ROOT: ${{ inputs.root }}
      run: |
        set -uo pipefail

        # Validate the requested version before use: accept the `latest` dist-tag
        # or a semantic version (e.g. 1.2.3, 1.2.3-rc.1). Combined with env-var
        # passing and quoting below, this blocks injection via the version input.
        if [[ "$VERSION" != "latest" && ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-+][0-9A-Za-z.-]+)?$ ]]; then
          echo "::error::geml-check: invalid version '$VERSION' — expected 'latest' or a semver like 1.2.3."
          exit 1
        fi

        npm install -g "@geml/geml@$VERSION"

        # `root` is an explicit, workflow-authored grant (quoted env var = data,
        # never shell-expanded). The CLI re-validates it and still refuses any
        # reference escaping past it.
        rootargs=()
        if [ -n "$ROOT" ]; then
          if [ ! -d "$ROOT" ]; then
            echo "::error::geml-check: root '$ROOT' is not a directory."
            exit 1
          fi
          rootargs=(--root "$ROOT")
        fi

        if [ -n "$FILES" ]; then
          # Intentionally unquoted so whitespace splits into words and globs
          # expand — but $FILES is a shell variable (data), so no command,
          # arithmetic, or brace substitution runs on its contents.
          # shellcheck disable=SC2206
          files=( $FILES )
        else
          mapfile -t files < <(git -C "$GITHUB_WORKSPACE" ls-files '*.geml')
        fi

        if [ "${#files[@]}" -eq 0 ]; then
          echo "geml-check: no .geml files found — nothing to check."
          exit 0
        fi

        echo "geml-check: checking ${#files[@]} file(s) with @geml/geml@$VERSION"
        fail=0
        for f in "${files[@]}"; do
          [ -f "$f" ] || continue
          echo "── $f"
          if geml check "${rootargs[@]}" "$f"; then
            :
          else
            echo "::error file=$f::GEML check failed (see diagnostics above)"
            fail=1
          fi
        done

        if [ "$fail" -ne 0 ]; then
          echo "::error::GEML check found errors — a reference is broken or a document is malformed."
        else
          echo "geml-check: all files OK."
        fi
        exit $fail
